name: Update Gallery JSON

on:
  push:
    paths:
      - 'images/tattoos/**'
      - 'images/flash/**'

jobs:
  update-gallery:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate gallery.json
        run: |
          echo '{' > images/gallery.json
          echo '  "tattoos": [' >> images/gallery.json
          files=$(ls images/tattoos/*.{jpg,jpeg,png,webp} 2>/dev/null | sed 's/^/    "/' | sed 's/$/"/' | paste -sd ',')
          echo "$files" >> images/gallery.json
          echo '  ],' >> images/gallery.json
          echo '  "flash": [' >> images/gallery.json
          files=$(ls images/flash/*.{jpg,jpeg,png,webp} 2>/dev/null | sed 's/^/    "/' | sed 's/$/"/' | paste -sd ',')
          echo "$files" >> images/gallery.json
          echo '  ]' >> images/gallery.json
          echo '}' >> images/gallery.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add images/gallery.json
          git diff --staged --quiet || git commit -m "Auto-update gallery.json"
          git pull origin main --rebase
          git push