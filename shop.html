<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Willie Boswick — Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="page-nav">
  <a href="index.html" class="nav-logo">Willie Boswick</a>
  <button class="nav-hamburger" onclick="toggleMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-links" id="nav-links">
    <a href="tattoos.html">Tattoos</a>
    <a href="shop.html">Shop</a>
    <a href="index.html#booking">Contact</a>
  </div>
</nav>

<section class="shop-section">
  <div class="shop-header">
    <h2>Shop</h2>
  </div>
  <div class="shop-grid"></div>
</section>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img class="modal-img" id="modal-img" src="" alt=""/>
    <div class="modal-details">
      <h3 id="modal-name"></h3>
      <p id="modal-price"></p>
      <form id="modal-paypal-form" action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
        <input type="hidden" name="cmd" value="_xclick">
        <input type="hidden" name="business" value="ADD_YOUR_PAYPAL_EMAIL@gmail.com">
        <input type="hidden" name="currency_code" value="USD">
        <input type="hidden" name="no_shipping" value="2">
        <input type="hidden" id="paypal-item-name" name="item_name" value="">
        <input type="hidden" id="paypal-amount" name="amount" value="">
        <button type="submit" class="modal-buy">Buy via PayPal</button>
      </form>
    </div>
  </div>
</div>
<!-- CONTACT BAR -->
<div class="contact-bar">
  <a href="https://www.instagram.com/wboswick" target="_blank" class="contact-bar-item">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4"/>
      <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/>
    </svg>
    <span>@wboswick</span>
  </a>
  <div class="contact-bar-divider"></div>
  <a href="mailto:boswicktattoo@gmail.com" class="contact-bar-item">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <polyline points="2,4 12,13 22,4"/>
    </svg>
    <span>boswicktattoo@gmail.com</span>
  </a>
</div>
<footer>
  <div class="footer-logo">Willie Boswick Tattoos</div>
  <div class="footer-address">Find me at <a href="https://www.electricchairportland.com">Electric Chair Tattoo</a> · 4179 SE Division St, Portland, OR 97202</div>
  <div class="footer-copy">© 2026 · Portland, OR</div>
</footer>

<script>
async function loadShop() {
  const res = await fetch('shop.json');
  const items = await res.json();
  const grid = document.querySelector('.shop-grid');

  grid.innerHTML = items.map(item => `
    <div class="shop-card" onclick="openModal('images/shop/${item.image}', '${item.name}', ${parseFloat(String(item.price).replace('$',''))})">
      <div class="shop-img"><img src="images/shop/${item.image}" alt="${item.name}"/></div>
      <div class="shop-info">
        <span class="shop-name">${item.name}</span>
        <span class="shop-price">$${item.price}</span>
      </div>
    </div>
  `).join('');
}

function openModal(src, name, price) {
  document.getElementById('modal-img').src = src;
  document.getElementById('modal-name').textContent = name;
  document.getElementById('modal-price').textContent = '$' + price;
  document.getElementById('paypal-item-name').value = name;
  document.getElementById('paypal-amount').value = price;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}
function toggleMenu() {
  document.getElementById('nav-links').classList.toggle('open');
  document.querySelector('.nav-hamburger').classList.toggle('open');
}
loadShop();
</script>
</body>
</html>
